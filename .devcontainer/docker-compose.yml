version: "3.8"
services:
  px4-ros2-humble:
    # Set DOCKER_RUNTIME=nvidia in your shell before running if you have an NVIDIA GPU.
    # Otherwise the default runc runtime is used.
    runtime: ${DOCKER_RUNTIME:-runc}
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    user: dev

    network_mode: host

    init: true
    privileged: true

    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      # Only meaningful when DOCKER_RUNTIME=nvidia; harmless otherwise.
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    stdin_open: true
    tty: true
    command: "/bin/bash"
